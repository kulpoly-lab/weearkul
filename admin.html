<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - แบบสอบถาม</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f0f2f8;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.2rem; }
    header a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 5px 12px;
      border-radius: 6px;
    }
    header a:hover { background: rgba(255,255,255,0.15); }

    .stats {
      display: flex;
      gap: 14px;
      padding: 22px 28px 0;
      flex-wrap: wrap;
    }
    .stat {
      background: #fff;
      border-radius: 10px;
      padding: 16px 24px;
      flex: 1;
      min-width: 120px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
      border-left: 4px solid #667eea;
    }
    .stat.today { border-left-color: #2ecc71; }
    .stat .lbl  { font-size: 0.78rem; color: #999; margin-bottom: 4px; }
    .stat .val  { font-size: 1.9rem; font-weight: 700; color: #333; }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 18px 28px 0;
      flex-wrap: wrap;
    }
    .toolbar input {
      flex: 1;
      min-width: 180px;
      padding: 9px 13px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.93rem;
      outline: none;
    }
    .toolbar input:focus { border-color: #667eea; }

    .btn {
      padding: 9px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-csv     { background: #27ae60; color: #fff; }
    .btn-csv:hover { background: #219d55; }
    .btn-clear   { background: #fff; color: #e74c3c; border: 1.5px solid #e74c3c; }
    .btn-clear:hover { background: #e74c3c; color: #fff; }

    .wrap {
      margin: 18px 28px 32px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
      overflow: auto;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 560px; }
    thead { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    thead th {
      padding: 13px 14px;
      text-align: left;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:hover { background: rgba(255,255,255,0.1); }

    tbody tr { border-bottom: 1px solid #f2f2f2; }
    tbody tr:last-child { border: none; }
    tbody tr:hover { background: #f8f6ff; }
    tbody td { padding: 12px 14px; color: #444; vertical-align: middle; }
    td.num { color: #bbb; width: 36px; font-size: 0.8rem; }

    .del-btn {
      background: none;
      border: 1.5px solid #e74c3c;
      color: #e74c3c;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .del-btn:hover { background: #e74c3c; color: #fff; }

    .empty { text-align: center; padding: 48px; color: #bbb; }

    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #333; color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #toast.ok   { background: #27ae60; }
    #toast.err  { background: #e74c3c; }
  </style>
</head>
<body>

<header>
  <h1>Admin — แบบสอบถาม</h1>
  <a href="แบบสอบถาม.html">กลับหน้าฟอร์ม</a>
</header>

<div class="stats">
  <div class="stat">
    <div class="lbl">ทั้งหมด</div>
    <div class="val" id="sTotal">0</div>
  </div>
  <div class="stat today">
    <div class="lbl">วันนี้</div>
    <div class="val" id="sToday">0</div>
  </div>
</div>

<div class="toolbar">
  <input type="search" id="q" placeholder="ค้นหาชื่อ, อีเมล, เบอร์โทร...">
  <button class="btn btn-csv" onclick="exportCSV()">Export CSV</button>
  <button class="btn btn-clear" onclick="clearAll()">ลบทั้งหมด</button>
</div>

<div class="wrap">
  <table>
    <thead>
      <tr>
        <th class="num">#</th>
        <th data-k="name">ชื่อ-นามสกุล ↕</th>
        <th data-k="email">อีเมล ↕</th>
        <th data-k="phone">เบอร์โทร ↕</th>
        <th data-k="timestamp">วันเวลา ↕</th>
        <th style="width:60px"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="toast"></div>

<script>
  const KEY = 'survey_data';
  let sortKey = 'timestamp', sortAsc = false;

  function load() {
    return JSON.parse(localStorage.getItem(KEY) || '[]');
  }
  function save(data) {
    localStorage.setItem(KEY, JSON.stringify(data));
  }

  function render() {
    const all = load();
    const q   = document.getElementById('q').value.trim().toLowerCase();

    const today = new Date().toLocaleDateString('th-TH');
    document.getElementById('sTotal').textContent = all.length;
    document.getElementById('sToday').textContent = all.filter(r => r.timestamp && r.timestamp.startsWith(today.split('/').reverse().join('-').slice(0,10))).length;

    let rows = q
      ? all.filter(r => [r.name, r.email, r.phone].some(v => (v||'').toLowerCase().includes(q)))
      : [...all];

    rows.sort((a, b) => {
      const av = (a[sortKey] || '').toString();
      const bv = (b[sortKey] || '').toString();
      return sortAsc ? av.localeCompare(bv, 'th') : bv.localeCompare(av, 'th');
    });

    const tbody = document.getElementById('tbody');
    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">${q ? 'ไม่พบข้อมูล' : 'ยังไม่มีข้อมูล'}</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map((r, i) => `
      <tr>
        <td class="num">${i+1}</td>
        <td>${esc(r.name)}</td>
        <td>${esc(r.email)}</td>
        <td>${esc(r.phone)}</td>
        <td>${esc(r.timestamp)}</td>
        <td><button class="del-btn" onclick="del('${r.id}')">ลบ</button></td>
      </tr>
    `).join('');
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function del(id) {
    if (!confirm('ลบข้อมูลนี้ใช่หรือไม่?')) return;
    save(load().filter(r => r.id !== id));
    render();
    toast('ลบแล้ว', 'ok');
  }

  function clearAll() {
    if (!confirm('ลบข้อมูลทั้งหมดใช่หรือไม่?')) return;
    localStorage.removeItem(KEY);
    render();
    toast('ลบทั้งหมดแล้ว', 'ok');
  }

  function exportCSV() {
    const all = load();
    if (!all.length) { toast('ไม่มีข้อมูล', 'err'); return; }
    const header = ['ลำดับ','ชื่อ-นามสกุล','อีเมล','เบอร์โทร','วันเวลา'];
    const rows   = all.map((r, i) => [
      i+1,
      `"${(r.name||'').replace(/"/g,'""')}"`,
      `"${(r.email||'').replace(/"/g,'""')}"`,
      `"${(r.phone||'').replace(/"/g,'""')}"`,
      `"${(r.timestamp||'').replace(/"/g,'""')}"`
    ].join(','));
    const csv  = '﻿' + header.join(',') + '\n' + rows.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a    = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: `survey_${new Date().toISOString().slice(0,10)}.csv`
    });
    a.click();
    toast('Export เสร็จแล้ว', 'ok');
  }

  // sort headers
  document.querySelectorAll('thead th[data-k]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.k;
      sortAsc = sortKey === k ? !sortAsc : true;
      sortKey = k;
      render();
    });
  });

  document.getElementById('q').addEventListener('input', render);

  let tt;
  function toast(msg, type='') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(tt);
    tt = setTimeout(() => el.className = '', 2500);
  }

  render();
</script>
</body>
</html>
