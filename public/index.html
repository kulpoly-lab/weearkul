<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบสอบถาม</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      padding: 40px 36px;
      width: 100%;
      max-width: 460px;
    }

    .card h1 { font-size: 1.6rem; color: #333; margin-bottom: 6px; }
    .card .subtitle { color: #888; font-size: 0.92rem; margin-bottom: 30px; }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    label .req { color: #e74c3c; margin-left: 2px; }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      color: #333;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
    input.err   { border-color: #e74c3c; }

    .err-msg { color: #e74c3c; font-size: 0.8rem; margin-top: 4px; display: none; }
    .err-msg.show { display: block; }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
    }
    button[type="submit"]:hover { opacity: 0.9; }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    .admin-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 0.82rem;
      color: #aaa;
      text-decoration: none;
    }
    .admin-link:hover { color: #667eea; }

    .success {
      display: none;
      text-align: center;
      padding: 24px 0 8px;
    }
    .success.show { display: block; }
    .success .icon { font-size: 3rem; }
    .success h2 { color: #27ae60; margin: 12px 0 6px; font-size: 1.2rem; }
    .success p  { color: #777; font-size: 0.9rem; margin-bottom: 20px; }

    .summary {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 14px 18px;
      text-align: left;
      font-size: 0.9rem;
      color: #555;
      line-height: 2;
      margin-bottom: 20px;
    }

    .btn-new {
      background: none;
      border: 1.5px solid #667eea;
      color: #667eea;
      border-radius: 8px;
      padding: 9px 22px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-new:hover { background: #667eea; color: #fff; }
  </style>
</head>
<body>
<div class="card">
  <h1>แบบสอบถาม</h1>
  <p class="subtitle">กรุณากรอกข้อมูลให้ครบถ้วน</p>

  <form id="form" novalidate>
    <div class="form-group">
      <label>ชื่อ-นามสกุล <span class="req">*</span></label>
      <input id="name" type="text" placeholder="เช่น สมชาย ใจดี">
      <div class="err-msg" id="nameErr">กรุณากรอกชื่อ-นามสกุล</div>
    </div>

    <div class="form-group">
      <label>อีเมล <span class="req">*</span></label>
      <input id="email" type="email" placeholder="เช่น example@email.com">
      <div class="err-msg" id="emailErr">กรุณากรอกอีเมลให้ถูกต้อง</div>
    </div>

    <div class="form-group">
      <label>เบอร์โทรศัพท์ <span class="req">*</span></label>
      <input id="phone" type="tel" placeholder="เช่น 0812345678" maxlength="10">
      <div class="err-msg" id="phoneErr">กรุณากรอกเบอร์โทร 10 หลัก</div>
    </div>

    <button type="submit" id="submitBtn">ส่งข้อมูล</button>
  </form>

  <div class="success" id="success">
    <div class="icon">&#9989;</div>
    <h2>ส่งข้อมูลเรียบร้อยแล้ว!</h2>
    <p>ขอบคุณที่ร่วมตอบแบบสอบถาม</p>
    <div class="summary" id="summary"></div>
    <button class="btn-new" onclick="resetForm()">กรอกข้อมูลใหม่</button>
  </div>

  <a class="admin-link" href="admin.html">ดูข้อมูลทั้งหมด (Admin)</a>
</div>

<script>
  document.getElementById('phone').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '');
  });

  document.getElementById('form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name  = document.getElementById('name');
    const email = document.getElementById('email');
    const phone = document.getElementById('phone');
    let ok = true;

    const check = (el, errId, test) => {
      if (!test(el.value.trim())) {
        el.classList.add('err');
        document.getElementById(errId).classList.add('show');
        ok = false;
      } else {
        el.classList.remove('err');
        document.getElementById(errId).classList.remove('show');
      }
    };

    check(name,  'nameErr',  v => v !== '');
    check(email, 'emailErr', v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v));
    check(phone, 'phoneErr', v => /^0\d{9}$/.test(v));
    if (!ok) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'กำลังส่ง...';

    try {
      const res = await fetch('/api/survey', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:  name.value.trim(),
          email: email.value.trim(),
          phone: phone.value.trim()
        })
      });
      if (!res.ok) throw new Error('Server error');
      const record = await res.json();

      document.getElementById('summary').innerHTML =
        `<strong>ชื่อ:</strong> ${record.name}<br>` +
        `<strong>อีเมล:</strong> ${record.email}<br>` +
        `<strong>เบอร์โทร:</strong> ${record.phone}`;

      document.getElementById('form').style.display = 'none';
      document.getElementById('success').classList.add('show');
    } catch (err) {
      alert('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
      btn.disabled = false;
      btn.textContent = 'ส่งข้อมูล';
    }
  });

  function resetForm() {
    document.getElementById('form').reset();
    document.getElementById('form').style.display = 'block';
    document.getElementById('success').classList.remove('show');
    const btn = document.getElementById('submitBtn');
    btn.disabled = false;
    btn.textContent = 'ส่งข้อมูล';
    ['name','email','phone'].forEach(id => document.getElementById(id).classList.remove('err'));
    ['nameErr','emailErr','phoneErr'].forEach(id => document.getElementById(id).classList.remove('show'));
  }
</script>
</body>
</html>
